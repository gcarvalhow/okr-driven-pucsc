name: okrdriven-dev

services:
  postgres:
    image: postgres:latest
    container_name: okrdriven-postgres-dev
    restart: on-failure
    environment:
      POSTGRES_USER: okrdriven
      POSTGRES_PASSWORD: okrdriven
      POSTGRES_DB: okrdriven
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 512M

  mongodb:
    image: mongo:latest
    container_name: okrdriven-mongodb-dev
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: okrdriven
      MONGO_INITDB_ROOT_PASSWORD: okrdriven
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: okrdriven-rabbitmq-dev
    hostname: okrdriven-rmq
    restart: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pg_data:
    driver: local
  mongodb_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  default:
    name: okrdriven-dev